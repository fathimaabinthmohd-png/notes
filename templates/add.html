<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if edit %}Edit Note{% else %}Add a Note{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>{% if edit %}Edit Note{% else %}Add a New Note{% endif %}</h1>
        <form id="noteForm" method="POST" action="{% if edit %}{{ url_for('edit_note', note_id=note.id) }}{% else %}{{ url_for('add_note') }}{% endif %}">
            <label for="heading">Heading (optional):</label><br>
            <input id="heading" name="heading" value="{% if note %}{{ note.heading }}{% endif %}" placeholder="Enter heading" class="text-input"><br><br>

            <label for="pendingLines">Write note lines here:</label><br>
            <textarea id="pendingLines" class="text-input" rows="4" placeholder="Type multiple lines here. Use Shift+Enter to create a new line inside the note, then click Add lines."></textarea>
            <div class="line-actions-row">
                <label class="checkbox-label"><input id="newPoint" type="checkbox"> Small point</label>
                <button type="button" id="addLinesBtn" class="btn btn-secondary">Add lines</button>
            </div>

            <ul id="linesList" class="note-list"></ul>

            <div class="form-actions">
                <input type="submit" value="{% if edit %}Save Changes{% else %}Add Note{% endif %}" class="btn">
                <a href="{{ url_for('index') }}" class="link-button">Back to home</a>
            </div>
        </form>
    </div>

    <script>
    // Manage lines in the client and submit them as hidden inputs named lines[] and points[]
    const pendingLines = document.getElementById('pendingLines');
    const newPoint = document.getElementById('newPoint');
    const linesList = document.getElementById('linesList');
    const form = document.getElementById('noteForm');

    function addLineToList(text, is_point=false, lineId=null){
        const li = document.createElement('li');
        li.className = 'note-item note-line-item';
        li.dataset.content = text;
        li.dataset.isPoint = is_point ? 'true' : 'false';
        if(lineId) li.dataset.lineId = lineId;

        const timeLabel = document.createElement('div');
        timeLabel.className = 'line-time';
        timeLabel.textContent = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit', hour12:true});

        const content = document.createElement('div');
        content.className = 'line-display';
        content.textContent = (is_point ? '• ' : '') + text;

        const actions = document.createElement('div');
        actions.className = 'note-actions';

        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.textContent = 'Edit';
        editBtn.className = 'btn btn-secondary';
        editBtn.onclick = () => {
            pendingLines.value = text;
            newPoint.checked = li.dataset.isPoint === 'true';
            li.remove();
        };

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.textContent = 'Remove';
        delBtn.className = 'btn btn-secondary';
        delBtn.onclick = () => li.remove();

        const pointToggle = document.createElement('button');
        pointToggle.type = 'button';
        pointToggle.textContent = is_point ? 'Point' : 'Plain';
        pointToggle.className = 'btn btn-secondary';
        pointToggle.onclick = () => {
            const nowPoint = li.dataset.isPoint !== 'true';
            li.dataset.isPoint = nowPoint ? 'true' : 'false';
            content.textContent = (nowPoint ? '• ' : '') + text;
            pointToggle.textContent = nowPoint ? 'Point' : 'Plain';
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        actions.appendChild(pointToggle);

        const lineRow = document.createElement('div');
        lineRow.className = 'note-line-row';
        lineRow.appendChild(timeLabel);
        lineRow.appendChild(content);
        lineRow.appendChild(actions);

        li.appendChild(lineRow);
        linesList.appendChild(li);
    }

    pendingLines.addEventListener('keydown', function(e){
        if(e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            addPendingLines();
        }
    });

    document.getElementById('addLinesBtn').addEventListener('click', addPendingLines);

    function addPendingLines(){
        const rawText = pendingLines.value.trim();
        if(!rawText) return;
        const lines = rawText.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        lines.forEach(line => addLineToList(line, newPoint.checked));
        pendingLines.value = '';
        newPoint.checked = false;
    }

    form.addEventListener('submit', function(e){
        // remove existing hidden inputs
        Array.from(document.querySelectorAll('input[name="lines[]"]')).forEach(n=>n.remove());
        Array.from(document.querySelectorAll('input[name="points[]"]')).forEach(n=>n.remove());
        // create hidden inputs for each line
        const items = Array.from(linesList.querySelectorAll('li'));
        items.forEach((li, idx)=>{
            const text = li.dataset.content || li.querySelector('.line-display').textContent.replace(/^•\s*/, '');
            const isPoint = li.dataset.isPoint === 'true' ? 'on' : '';
            const hi = document.createElement('input');
            hi.type = 'hidden';
            hi.name = 'lines[]';
            hi.value = text;
            form.appendChild(hi);
            const hp = document.createElement('input');
            hp.type = 'hidden';
            hp.name = 'points[]';
            hp.value = isPoint;
            form.appendChild(hp);
        });
    });

    // if editing, prepopulate existing lines
    {% if edit and note and note.lines %}
        {% for line in note.lines %}
            addLineToList({{ line.content | tojson }}, {{ 'true' if line.is_point else 'false' }}, {{ line.id }});
        {% endfor %}
    {% endif %}
    </script>
</body>
</html>
