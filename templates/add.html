<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if edit %}Edit Note{% else %}Add a Note{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>{% if edit %}Edit Note{% else %}Add a New Note{% endif %}</h1>
        <form method="POST" action="{% if edit %}{{ url_for('edit_note', note_id=note.id) }}{% else %}{{ url_for('add_note') }}{% endif %}">
            <label for="content">Note content:</label><br>
            <textarea id="content" name="content" rows="4" cols="50" required>{% if note %}{{ note.content }}{% endif %}</textarea><br><br>
            <input type="submit" value="{% if edit %}Save Changes{% else %}Add Note{% endif %}">
        </form>
        <p><a href="{{ url_for('index') }}">Back to home</a></p>
    </div>
</body>
</html>
